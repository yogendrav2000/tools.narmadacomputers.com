<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Password Generator - Generate Secure Passwords Online - Narmada Tools</title>
  <meta name="description" content="Generate secure, strong, random passwords offline. Toggle length, letters, numbers, symbols, and exclusions. 100% secure, browser-based.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-955 font-sans transition-colors duration-200">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass-effect border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex items-center space-x-2">
        <img src="../logo.jpg" alt="Narmada Tools Logo" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-blue-500/10">
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">Narmada Tools</span>
      </a>

      <div class="flex items-center space-x-4">
        <button class="theme-toggle-btn p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors">
          <i data-lucide="sun" class="w-4 h-4 hidden dark:block text-amber-400"></i>
          <i data-lucide="moon" class="w-4 h-4 block dark:hidden text-slate-600"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <nav class="flex items-center space-x-2 text-xs text-slate-500 dark:text-slate-400 mb-6">
      <a href="../index.html" class="hover:text-blue-650 transition-colors">Home</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <a href="../categories/utility.html" class="hover:text-blue-650 transition-colors">Utility Calculators</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <span class="text-slate-800 dark:text-slate-300 font-medium">Password Generator</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Interactive Input Area (2 columns) -->
      <div class="lg:col-span-2 space-y-6">
        
        <!-- Live Output Box -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <h1 class="text-xl font-bold flex items-center gap-2 mb-6">
            <i data-lucide="shield" class="text-cyan-600 w-5 h-5"></i>
            <span>Password Generator</span>
          </h1>

          <div class="bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl border border-slate-200 dark:border-slate-850 flex items-center justify-between font-mono text-lg tracking-wider break-all text-slate-850 dark:text-white">
            <span id="password-display">Generating...</span>
            <button onclick="copyPassword()" class="p-2 bg-cyan-600 hover:bg-cyan-700 text-white rounded-xl transition-colors ml-4 flex-shrink-0" title="Copy Password"><i data-lucide="copy" class="w-4.5 h-4.5"></i></button>
          </div>

          <!-- Password Strength Meter -->
          <div class="mt-4 space-y-2">
            <div class="flex justify-between text-xs font-bold uppercase tracking-wider text-slate-500">
              <span>Strength Rating:</span>
              <span id="strength-label" class="text-emerald-500">Strong</span>
            </div>
            <div class="w-full bg-slate-100 dark:bg-slate-950 h-2 rounded-full overflow-hidden">
              <div id="strength-bar" class="bg-emerald-500 h-full w-3/4 transition-all duration-300"></div>
            </div>
          </div>
        </div>

        <!-- Customizations Checklist -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm space-y-4">
          <h3 class="font-bold text-base border-b border-slate-100 dark:border-slate-800 pb-2">Customize Parameters</h3>

          <div class="space-y-4">
            <!-- Length -->
            <div>
              <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Password Length (<span id="pass-len-val">16</span>)</label>
              <input type="range" id="pass-len" min="6" max="50" value="16" class="w-full accent-cyan-600" oninput="updateLenVal(this.value)">
            </div>

            <!-- Parameters checklist -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
              <div class="flex items-center space-x-2">
                <input type="checkbox" id="pass-upper" checked class="w-4 h-4 rounded text-blue-600 accent-cyan-600" onchange="generatePassword()">
                <label for="pass-upper" class="text-sm font-semibold text-slate-650 dark:text-slate-450 cursor-pointer">Include Uppercase (A-Z)</label>
              </div>
              <div class="flex items-center space-x-2">
                <input type="checkbox" id="pass-lower" checked class="w-4 h-4 rounded text-blue-600 accent-cyan-600" onchange="generatePassword()">
                <label for="pass-lower" class="text-sm font-semibold text-slate-655 dark:text-slate-450 cursor-pointer">Include Lowercase (a-z)</label>
              </div>
              <div class="flex items-center space-x-2">
                <input type="checkbox" id="pass-numbers" checked class="w-4 h-4 rounded text-blue-600 accent-cyan-600" onchange="generatePassword()">
                <label for="pass-numbers" class="text-sm font-semibold text-slate-655 dark:text-slate-450 cursor-pointer">Include Numbers (0-9)</label>
              </div>
              <div class="flex items-center space-x-2">
                <input type="checkbox" id="pass-symbols" checked class="w-4 h-4 rounded text-blue-600 accent-cyan-600" onchange="generatePassword()">
                <label for="pass-symbols" class="text-sm font-semibold text-slate-655 dark:text-slate-450 cursor-pointer">Include Symbols (!@#$%^&*)</label>
              </div>
              <div class="flex items-center space-x-2">
                <input type="checkbox" id="pass-exclude-similar" class="w-4 h-4 rounded text-blue-600 accent-cyan-600" onchange="generatePassword()">
                <label for="pass-exclude-similar" class="text-sm font-semibold text-slate-655 dark:text-slate-450 cursor-pointer">Exclude similar chars (i, l, 1, 0, o, O)</label>
              </div>
            </div>
          </div>

          <div class="flex justify-end border-t border-slate-100 dark:border-slate-800 pt-4 mt-6">
            <button onclick="generatePassword()" class="px-6 py-2.5 bg-cyan-600 hover:bg-cyan-700 text-white text-xs font-bold rounded-xl transition-colors shadow-md shadow-cyan-500/10">Re-generate Password</button>
          </div>
        </div>
      </div>

      <!-- Information Sidebar -->
      <div class="space-y-6">
        <div class="border border-dashed border-slate-350 dark:border-slate-800 p-6 rounded-2xl bg-white dark:bg-slate-900/50 flex flex-col justify-center items-center h-48">
          <i data-lucide="layout-grid" class="w-6 h-6 text-slate-400 mb-2"></i>
          <span class="text-xs text-slate-500 uppercase tracking-widest text-center">Sponsored Advertisement</span>
        </div>
      </div>

    </div>
  </main>

  <footer class="mt-auto bg-slate-900 text-slate-550 border-t border-slate-800 py-6 text-center text-xs">
    <p>&copy; 2026 Narmada Tools. Secure Offline Utilities Hub.</p>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function updateLenVal(val) {
      document.getElementById("pass-len-val").innerText = val;
      generatePassword();
    }

    const UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const LOWER = "abcdefghijklmnopqrstuvwxyz";
    const NUMBERS = "0123456789";
    const SYMBOLS = "!@#$%^&*()_+~`|}{[]:;?><,./-=";
    const SIMILAR = /[il1Lo0O]/g;

    function generatePassword() {
      const len = parseInt(document.getElementById("pass-len").value);
      const incUpper = document.getElementById("pass-upper").checked;
      const incLower = document.getElementById("pass-lower").checked;
      const incNum = document.getElementById("pass-numbers").checked;
      const incSym = document.getElementById("pass-symbols").checked;
      const excSimilar = document.getElementById("pass-exclude-similar").checked;

      let pool = "";
      if (incUpper) pool += UPPER;
      if (incLower) pool += LOWER;
      if (incNum) pool += NUMBERS;
      if (incSym) pool += SYMBOLS;

      if (excSimilar) {
        pool = pool.replace(SIMILAR, "");
      }

      if (!pool) {
        document.getElementById("password-display").innerText = "Select at least 1 option";
        updateStrength(0);
        return;
      }

      // Cryptographically secure random number generator values
      let pass = "";
      const array = new Uint32Array(len);
      crypto.getRandomValues(array);

      for (let i = 0; i < len; i++) {
        pass += pool.charAt(array[i] % pool.length);
      }

      document.getElementById("password-display").innerText = pass;

      // Rate strength
      let score = 0;
      if (incUpper) score++;
      if (incLower) score++;
      if (incNum) score++;
      if (incSym) score++;
      if (len >= 12) score++;
      if (len >= 16) score++;

      updateStrength(score);
      
      window.trackToolEvent("password-generator", "generate");
    }

    function updateStrength(score) {
      const label = document.getElementById("strength-label");
      const bar = document.getElementById("strength-bar");

      if (score <= 2) {
        label.innerText = "Weak";
        label.className = "text-red-500";
        bar.className = "bg-red-500 h-full w-1/4";
      } else if (score <= 4) {
        label.innerText = "Medium";
        label.className = "text-amber-500";
        bar.className = "bg-amber-500 h-full w-2/4";
      } else if (score === 5) {
        label.innerText = "Strong";
        label.className = "text-emerald-500";
        bar.className = "bg-emerald-500 h-full w-3/4";
      } else {
        label.innerText = "Excellent / Secure";
        label.className = "text-cyan-600";
        bar.className = "bg-cyan-650 h-full w-full";
      }
    }

    function copyPassword() {
      const pass = document.getElementById("password-display").innerText;
      if (pass === "Generating..." || pass.includes("Select")) return;
      window.copyToClipboard(pass);
      window.trackToolEvent("password-generator", "copy");
    }

    window.addEventListener("DOMContentLoaded", () => {
      generatePassword();
    });
  </script>
</body>
</html>
