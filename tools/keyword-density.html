<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Keyword Density Checker - SEO Content Analyzer - Narmada Tools</title>
  <meta name="description" content="Analyze copy text to count keyword densities and phrase repetitions. Supports 1-word, 2-word, and 3-word phrase lists. Private and client-side.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 font-sans transition-colors duration-200">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass-effect border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex items-center space-x-2">
        <img src="../logo.jpg" alt="Narmada Tools Logo" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-blue-500/10">
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">Narmada Tools</span>
      </a>

      <div class="flex items-center space-x-4">
        <button class="theme-toggle-btn p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors">
          <i data-lucide="sun" class="w-4 h-4 hidden dark:block text-amber-400"></i>
          <i data-lucide="moon" class="w-4 h-4 block dark:hidden text-slate-600"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <nav class="flex items-center space-x-2 text-xs text-slate-500 dark:text-slate-400 mb-6">
      <a href="../index.html" class="hover:text-blue-650 transition-colors">Home</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <a href="../categories/seo.html" class="hover:text-blue-650 transition-colors">SEO Tools</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <span class="text-slate-800 dark:text-slate-300 font-medium">Keyword Density Checker</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Interactive Input Area (2 columns) -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <div class="flex items-center justify-between mb-4">
            <h1 class="text-xl font-bold flex items-center gap-2">
              <i data-lucide="key" class="text-amber-600 w-5 h-5"></i>
              <span>Keyword Density Checker</span>
            </h1>
            <button onclick="clearInput()" class="text-xs px-3 py-1.5 border border-red-200 dark:border-red-950 text-red-650 font-bold rounded-lg hover:bg-red-50 dark:hover:bg-red-950/20 transition-colors">Clear</button>
          </div>

          <textarea id="kd-textarea" placeholder="Paste your article copy here to check keyword density..." class="w-full h-80 p-4 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50 dark:bg-slate-950 dark:text-slate-100 transition-all font-sans text-sm resize-none" oninput="analyzeDensity()"></textarea>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 border-t border-slate-100 dark:border-slate-800 pt-4">
            <!-- Stopwords configuration -->
            <div class="flex items-center space-x-2">
              <input type="checkbox" id="kd-ignore-stopwords" checked class="w-4 h-4 rounded accent-amber-600" onchange="analyzeDensity()">
              <label for="kd-ignore-stopwords" class="text-xs font-semibold text-slate-600 dark:text-slate-400 cursor-pointer">Ignore common English stopwords (e.g. the, is, at)</label>
            </div>

            <!-- Limit selection -->
            <div class="flex items-center justify-end space-x-2">
              <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Limit Results:</label>
              <select id="kd-limit" class="px-2 py-1.5 text-xs border border-slate-250 dark:border-slate-800 rounded-lg bg-white dark:bg-slate-955 text-slate-700 dark:text-slate-350" onchange="analyzeDensity()">
                <option value="5">Top 5 matches</option>
                <option value="10" selected>Top 10 matches</option>
                <option value="15">Top 15 matches</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Tables Results Card -->
        <div id="kd-results-card" class="hidden bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm space-y-8">
          <h3 class="font-bold text-base flex items-center gap-2 border-b border-slate-100 dark:border-slate-800 pb-2">
            <i data-lucide="bar-chart" class="text-amber-600 w-4 h-4"></i>
            <span>Density Results Summary</span>
          </h3>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- 1-Word Density -->
            <div class="space-y-3">
              <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 block border-b border-slate-100 dark:border-slate-800 pb-1">1-Word Keywords</span>
              <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                  <thead class="bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-350 font-bold uppercase">
                    <tr>
                      <th class="p-2">Keyword</th>
                      <th class="p-2">Density</th>
                    </tr>
                  </thead>
                  <tbody id="kd-tbody-1"></tbody>
                </table>
              </div>
            </div>

            <!-- 2-Word Density -->
            <div class="space-y-3">
              <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 block border-b border-slate-100 dark:border-slate-800 pb-1">2-Word Phrases</span>
              <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                  <thead class="bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-350 font-bold uppercase">
                    <tr>
                      <th class="p-2">Phrase</th>
                      <th class="p-2">Density</th>
                    </tr>
                  </thead>
                  <tbody id="kd-tbody-2"></tbody>
                </table>
              </div>
            </div>

            <!-- 3-Word Density -->
            <div class="space-y-3">
              <span class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 block border-b border-slate-100 dark:border-slate-800 pb-1">3-Word Phrases</span>
              <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                  <thead class="bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-350 font-bold uppercase">
                    <tr>
                      <th class="p-2">Phrase</th>
                      <th class="p-2">Density</th>
                    </tr>
                  </thead>
                  <tbody id="kd-tbody-3"></tbody>
                </table>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- Information Sidebar -->
      <div class="space-y-6">
        <div class="border border-dashed border-slate-350 dark:border-slate-800 p-6 rounded-2xl bg-white dark:bg-slate-900/50 flex flex-col justify-center items-center h-48">
          <i data-lucide="layout-grid" class="w-6 h-6 text-slate-400 mb-2"></i>
          <span class="text-xs text-slate-500 uppercase tracking-widest text-center">Sponsored Advertisement</span>
        </div>
      </div>

    </div>
  </main>

  <footer class="mt-auto bg-slate-900 text-slate-550 border-t border-slate-800 py-6 text-center text-xs">
    <p>&copy; 2026 Narmada Tools. Secure Offline Utilities Hub.</p>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function clearInput() {
      document.getElementById("kd-textarea").value = "";
      analyzeDensity();
    }

    const STOPWORDS = new Set([
      "the", "and", "a", "of", "to", "in", "is", "that", "it", "on", "for", "as", "with", "was", "at", 
      "by", "an", "be", "this", "are", "from", "or", "have", "you", "your", "they", "we", "he", "she", 
      "his", "her", "but", "not", "will", "would", "can", "if", "than", "then", "into", "about", "their"
    ]);

    function cleanWords(text) {
      // Split on spaces, remove punctuation, filter empty strings
      return text.trim().toLowerCase()
        .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, "")
        .split(/\s+/)
        .filter(w => w.length > 0);
    }

    function analyzeDensity() {
      const text = document.getElementById("kd-textarea").value;
      const ignore = document.getElementById("kd-ignore-stopwords").checked;
      const limit = parseInt(document.getElementById("kd-limit").value) || 10;

      const words = cleanWords(text);
      const totalWords = words.length;

      const resultsCard = document.getElementById("kd-results-card");
      if (totalWords === 0) {
        resultsCard.classList.add("hidden");
        return;
      }
      resultsCard.classList.remove("hidden");

      // 1. One-Word Frequencies
      const counts1 = {};
      words.forEach(w => {
        if (ignore && STOPWORDS.has(w)) return;
        if (w.length < 3) return; // Ignore very short words
        counts1[w] = (counts1[w] || 0) + 1;
      });
      const sorted1 = Object.entries(counts1).sort((a,b) => b[1] - a[1]).slice(0, limit);

      // 2. Two-Word Phrases (Bigrams)
      const counts2 = {};
      for (let i = 0; i < totalWords - 1; i++) {
        const w1 = words[i];
        const w2 = words[i+1];
        if (ignore && (STOPWORDS.has(w1) || STOPWORDS.has(w2))) continue;
        const phrase = `${w1} ${w2}`;
        counts2[phrase] = (counts2[phrase] || 0) + 1;
      }
      const sorted2 = Object.entries(counts2).sort((a,b) => b[1] - a[1]).slice(0, limit);

      // 3. Three-Word Phrases (Trigrams)
      const counts3 = {};
      for (let i = 0; i < totalWords - 2; i++) {
        const w1 = words[i];
        const w2 = words[i+1];
        const w3 = words[i+2];
        if (ignore && (STOPWORDS.has(w1) || STOPWORDS.has(w2) || STOPWORDS.has(w3))) continue;
        const phrase = `${w1} ${w2} ${w3}`;
        counts3[phrase] = (counts3[phrase] || 0) + 1;
      }
      const sorted3 = Object.entries(counts3).sort((a,b) => b[1] - a[1]).slice(0, limit);

      // Render tables
      renderTable("kd-tbody-1", sorted1, totalWords);
      renderTable("kd-tbody-2", sorted2, totalWords);
      renderTable("kd-tbody-3", sorted3, totalWords);
    }

    function renderTable(tbodyId, sortedArr, totalCount) {
      const tbody = document.getElementById(tbodyId);
      if (sortedArr.length === 0) {
        tbody.innerHTML = `<tr><td colspan="2" class="p-3 text-center text-slate-400">No phrases found.</td></tr>`;
        return;
      }

      tbody.innerHTML = sortedArr.map(([phrase, count]) => {
        const ratio = ((count / totalCount) * 100).toFixed(1);
        return `
          <tr class="border-b border-slate-100 dark:border-slate-900 last:border-b-0">
            <td class="p-2.5 font-medium text-slate-700 dark:text-slate-350 truncate max-w-xs capitalize" title="${phrase}">${phrase}</td>
            <td class="p-2.5 font-bold">${ratio}% <span class="text-[10px] text-slate-400 font-normal">(${count})</span></td>
          </tr>
        `;
      }).join("");
    }
  </script>
</body>
</html>
