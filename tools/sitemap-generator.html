<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free XML Sitemap Generator - Build Sitemap Online - Narmada Tools</title>
  <meta name="description" content="Generate XML sitemaps for your website crawls. Customize paths, modification dates, frequencies, and priority tags. Secure and offline.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 font-sans transition-colors duration-200">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass-effect border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex items-center space-x-2">
        <img src="../logo.jpg" alt="Narmada Tools Logo" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-blue-500/10">
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">Narmada Tools</span>
      </a>

      <div class="flex items-center space-x-4">
        <button class="theme-toggle-btn p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors">
          <i data-lucide="sun" class="w-4 h-4 hidden dark:block text-amber-400"></i>
          <i data-lucide="moon" class="w-4 h-4 block dark:hidden text-slate-600"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <nav class="flex items-center space-x-2 text-xs text-slate-500 dark:text-slate-400 mb-6">
      <a href="../index.html" class="hover:text-blue-650 transition-colors">Home</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <a href="../categories/seo.html" class="hover:text-blue-650 transition-colors">SEO Tools</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <span class="text-slate-800 dark:text-slate-300 font-medium">XML Sitemap Generator</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Interactive Inputs -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <h1 class="text-xl font-bold flex items-center gap-2 mb-6">
            <i data-lucide="map" class="text-amber-600 w-5 h-5"></i>
            <span>XML Sitemap Generator</span>
          </h1>

          <div class="space-y-4">
            <!-- Domain URL -->
            <div>
              <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Website Domain URL</label>
              <input type="url" id="sm-domain" value="https://mywebsite.com" class="w-full px-4 py-2.5 text-sm border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-950 dark:text-slate-100" placeholder="e.g. https://mywebsite.com" oninput="generateSitemap()">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <!-- Modify Date option -->
              <div>
                <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Last Modification Date</label>
                <select id="sm-date" class="w-full px-3 py-2 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-955 text-slate-700 dark:text-slate-350 text-sm" onchange="generateSitemap()">
                  <option value="none">None (Exclude tag)</option>
                  <option value="today" selected>Today (Server time)</option>
                </select>
              </div>

              <!-- Frequency -->
              <div>
                <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Change Frequency</label>
                <select id="sm-freq" class="w-full px-3 py-2 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-955 text-slate-700 dark:text-slate-350 text-sm" onchange="generateSitemap()">
                  <option value="always">Always</option>
                  <option value="hourly">Hourly</option>
                  <option value="daily" selected>Daily</option>
                  <option value="weekly">Weekly</option>
                  <option value="monthly">Monthly</option>
                  <option value="yearly">Yearly</option>
                  <option value="never">Never</option>
                </select>
              </div>

              <!-- Priority -->
              <div>
                <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Default Priority</label>
                <select id="sm-priority" class="w-full px-3 py-2 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-955 text-slate-700 dark:text-slate-350 text-sm" onchange="generateSitemap()">
                  <option value="1.0">1.0 (Homepage)</option>
                  <option value="0.8">0.8 (Primary level)</option>
                  <option value="0.5" selected>0.5 (Utility/Standard)</option>
                  <option value="0.3">0.3 (Secondary listings)</option>
                </select>
              </div>
            </div>

            <!-- Page paths -->
            <div>
              <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Subpage Paths (one per line)</label>
              <textarea id="sm-paths" class="w-full h-36 p-3 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50 dark:bg-slate-955 dark:text-slate-100 transition-all font-mono text-sm resize-none" oninput="generateSitemap()">/
/about
/contact
/blog
/services</textarea>
            </div>
          </div>
        </div>

        <!-- Generated XML -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">XML Sitemap Output Code</label>
          <textarea id="sitemap-output" readonly placeholder="Output XML will appear here..." class="w-full h-80 p-4 border border-slate-250 dark:border-slate-800 rounded-xl bg-slate-50/50 dark:bg-slate-955 dark:text-slate-150 transition-all font-mono text-xs leading-relaxed resize-none"></textarea>
          
          <div class="flex justify-end gap-2 mt-4">
            <button onclick="downloadSitemap()" class="px-4 py-2 border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900 text-xs font-semibold rounded-xl transition-colors flex items-center gap-1.5"><i data-lucide="download" class="w-4 h-4"></i>Download XML</button>
            <button onclick="copySitemap()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-xl transition-colors flex items-center gap-1.5 shadow-md shadow-blue-500/10">
              <i data-lucide="copy" class="w-4 h-4"></i>
              <span>Copy XML code</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="space-y-6">
        <div class="border border-dashed border-slate-350 dark:border-slate-800 p-6 rounded-2xl bg-white dark:bg-slate-900/50 flex flex-col justify-center items-center h-48">
          <i data-lucide="layout-grid" class="w-6 h-6 text-slate-400 mb-2"></i>
          <span class="text-xs text-slate-500 uppercase tracking-widest text-center">Sponsored Advertisement</span>
        </div>
      </div>

    </div>
  </main>

  <footer class="mt-auto bg-slate-900 text-slate-550 border-t border-slate-800 py-6 text-center text-xs">
    <p>&copy; 2026 Narmada Tools. Secure Offline Utilities Hub.</p>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function generateSitemap() {
      let domain = document.getElementById("sm-domain").value.trim();
      const lastModOption = document.getElementById("sm-date").value;
      const freq = document.getElementById("sm-freq").value;
      const priority = document.getElementById("sm-priority").value;
      const pathsText = document.getElementById("sm-paths").value;

      if (!domain) {
        document.getElementById("sitemap-output").value = "";
        return;
      }

      // Ensure domain ends properly
      if (domain.endsWith("/")) {
        domain = domain.slice(0, -1);
      }

      const paths = pathsText.split("\n").map(p => p.trim()).filter(p => p.length > 0);
      
      let xml = `<?xml version="1.0" encoding="UTF-8"?>\n`;
      xml += `<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n`;

      const todayStr = new Date().toISOString().split("T")[0];

      paths.forEach(p => {
        // Build correct path format
        let urlPath = p;
        if (!urlPath.startsWith("/")) {
          urlPath = "/" + urlPath;
        }
        if (urlPath === "/") {
          urlPath = "";
        }

        xml += `  <url>\n`;
        xml += `    <loc>${domain}${urlPath}</loc>\n`;
        if (lastModOption === "today") {
          xml += `    <lastmod>${todayStr}</lastmod>\n`;
        }
        xml += `    <changefreq>${freq}</changefreq>\n`;
        xml += `    <priority>${urlPath === "" ? "1.0" : priority}</priority>\n`;
        xml += `  </url>\n`;
      });

      xml += `</urlset>`;

      document.getElementById("sitemap-output").value = xml;
    }

    function copySitemap() {
      const text = document.getElementById("sitemap-output").value;
      if (!text) return;
      window.copyToClipboard(text);
      window.trackToolEvent("sitemap-generator", "copy");
    }

    function downloadSitemap() {
      const text = document.getElementById("sitemap-output").value;
      if (!text) return;
      window.downloadFile(text, "sitemap.xml", "application/xml");
      window.trackToolEvent("sitemap-generator", "download");
    }

    window.addEventListener("DOMContentLoaded", () => {
      generateSitemap();
    });
  </script>
</body>
</html>
