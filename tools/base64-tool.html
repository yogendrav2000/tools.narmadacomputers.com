<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Base64 Encoder/Decoder - Encode/Decode Online - Narmada Tools</title>
  <meta name="description" content="Encode strings to Base64 or decode Base64 data strings back into plain text. Secure browser-based execution. 100% private.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 font-sans transition-colors duration-200">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass-effect border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex items-center space-x-2">
        <img src="../logo.jpg" alt="Narmada Tools Logo" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-blue-500/10">
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">Narmada Tools</span>
      </a>

      <div class="flex items-center space-x-4">
        <button class="theme-toggle-btn p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors">
          <i data-lucide="sun" class="w-4 h-4 hidden dark:block text-amber-400"></i>
          <i data-lucide="moon" class="w-4 h-4 block dark:hidden text-slate-600"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <nav class="flex items-center space-x-2 text-xs text-slate-500 dark:text-slate-400 mb-6">
      <a href="../index.html" class="hover:text-blue-650 transition-colors">Home</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <a href="../categories/developer.html" class="hover:text-blue-650 transition-colors">Developer Tools</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <span class="text-slate-800 dark:text-slate-300 font-medium">Base64 Tool</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Interactive Inputs -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <div class="flex items-center justify-between mb-4">
            <h1 class="text-xl font-bold flex items-center gap-2">
              <i data-lucide="binary" class="text-violet-600 w-5 h-5"></i>
              <span>Base64 Encoder/Decoder</span>
            </h1>
            <button onclick="clearField()" class="text-xs px-3 py-1.5 border border-red-200 dark:border-red-950 text-red-650 font-bold rounded-lg hover:bg-red-50 dark:hover:bg-red-950/20 transition-colors">Reset</button>
          </div>

          <textarea id="b64-input" placeholder="Enter text to encode or Base64 code to decode..." class="w-full h-80 p-4 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50 dark:bg-slate-950 dark:text-slate-100 transition-all font-mono text-sm resize-none" oninput="updateCharCount()"></textarea>
          
          <div class="text-xs text-slate-400 mt-2" id="char-counter">Characters: 0</div>

          <div class="mt-4 flex flex-wrap gap-2.5 border-t border-slate-100 dark:border-slate-800 pt-4">
            <button onclick="encodeBase64()" class="px-5 py-2.5 bg-violet-650 hover:bg-violet-700 text-white text-xs font-bold rounded-xl transition-colors">Base64 Encode</button>
            <button onclick="decodeBase64()" class="px-5 py-2.5 bg-violet-650 hover:bg-violet-700 text-white text-xs font-bold rounded-xl transition-colors">Base64 Decode</button>
          </div>
        </div>

        <!-- Output Code -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Base64 Output Results</label>
          <textarea id="b64-output" readonly placeholder="Output results will render here..." class="w-full h-80 p-4 border border-slate-250 dark:border-slate-800 rounded-xl bg-slate-50/50 dark:bg-slate-955 dark:text-slate-150 transition-all font-mono text-sm resize-none"></textarea>
          
          <div class="flex justify-end gap-2 mt-4">
            <button onclick="downloadText()" class="px-4 py-2 border border-slate-200 dark:border-slate-850 hover:bg-slate-50 dark:hover:bg-slate-900 text-xs font-semibold rounded-xl transition-colors flex items-center gap-1.5"><i data-lucide="download" class="w-4 h-4"></i>Download Text</button>
            <button onclick="copyOutput()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-xl transition-colors flex items-center gap-1.5 shadow-md shadow-blue-500/10">
              <i data-lucide="copy" class="w-4 h-4"></i>
              <span>Copy Output</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="space-y-6">
        <div class="border border-dashed border-slate-350 dark:border-slate-800 p-6 rounded-2xl bg-white dark:bg-slate-900/50 flex flex-col justify-center items-center h-48">
          <i data-lucide="layout-grid" class="w-6 h-6 text-slate-400 mb-2"></i>
          <span class="text-xs text-slate-500 uppercase tracking-widest text-center">Sponsored Advertisement</span>
        </div>
      </div>

    </div>
  </main>

  <footer class="mt-auto bg-slate-900 text-slate-550 border-t border-slate-800 py-6 text-center text-xs">
    <p>&copy; 2026 Narmada Tools. Secure Offline Utilities Hub.</p>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function updateCharCount() {
      const val = document.getElementById("b64-input").value;
      document.getElementById("char-counter").innerText = `Characters: ${val.length}`;
    }

    function clearField() {
      document.getElementById("b64-input").value = "";
      document.getElementById("b64-output").value = "";
      updateCharCount();
    }

    // Safe UTF-8 Base64 Encoding
    function encodeBase64() {
      const val = document.getElementById("b64-input").value;
      if (!val) return;

      try {
        const encoded = btoa(unescape(encodeURIComponent(val)));
        document.getElementById("b64-output").value = encoded;
        
        if (window.confetti) {
          window.confetti({ particleCount: 30, spread: 50, colors: ["#8b5cf6", "#a78bfa"] });
        }
        window.trackToolEvent("base64-tool", "encode");
      } catch (err) {
        alert("Encoding failed: " + err.message);
      }
    }

    // Safe UTF-8 Base64 Decoding
    function decodeBase64() {
      const val = document.getElementById("b64-input").value.trim();
      if (!val) return;

      try {
        const decoded = decodeURIComponent(escape(atob(val)));
        document.getElementById("b64-output").value = decoded;
        
        if (window.confetti) {
          window.confetti({ particleCount: 30, spread: 50, colors: ["#8b5cf6", "#a78bfa"] });
        }
        window.trackToolEvent("base64-tool", "decode");
      } catch (err) {
        alert("Decoding failed. Ensure input string is a valid Base64 encoded structure.");
      }
    }

    function copyOutput() {
      const output = document.getElementById("b64-output").value;
      if (!output) return;
      window.copyToClipboard(output);
      window.trackToolEvent("base64-tool", "copy");
    }

    function downloadText() {
      const output = document.getElementById("b64-output").value;
      if (!output) return;
      window.downloadFile(output, "base64-output.txt", "text/plain");
      window.trackToolEvent("base64-tool", "download");
    }
  </script>
</body>
</html>
