<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Text Compare - Compare Text Side-by-Side Online - Narmada Tools</title>
  <meta name="description" content="Compare two text files or strings side-by-side to highlight differences, additions, and removals. Secure client-side browser execution.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 font-sans transition-colors duration-200">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass-effect border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex items-center space-x-2">
        <img src="../logo.jpg" alt="Narmada Tools Logo" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-blue-500/10">
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">Narmada Tools</span>
      </a>

      <div class="hidden md:block relative w-96 max-w-lg">
        <div class="relative">
          <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
          <input type="text" placeholder="Search 120+ tools..." class="global-search-input w-full pl-9 pr-4 py-2 text-sm bg-slate-100/80 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
        </div>
        <div class="search-results-dropdown hidden absolute top-full left-0 right-0 mt-2 max-h-96 overflow-y-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-850 rounded-xl shadow-2xl z-50"></div>
      </div>

      <div class="flex items-center space-x-4">
        <nav class="hidden lg:flex items-center space-x-6">
          <a href="../index.html#categories" class="text-sm font-medium text-slate-600 dark:text-slate-350 hover:text-blue-600 transition-colors">Categories</a>
          <a href="../blog/index.html" class="text-sm font-medium text-slate-600 dark:text-slate-350 hover:text-blue-600 transition-colors">Blog</a>
        </nav>
        <button class="theme-toggle-btn p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors">
          <i data-lucide="sun" class="w-4 h-4 hidden dark:block text-amber-400"></i>
          <i data-lucide="moon" class="w-4 h-4 block dark:hidden text-slate-600"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <!-- Breadcrumbs -->
    <nav class="flex items-center space-x-2 text-xs text-slate-500 dark:text-slate-400 mb-6">
      <a href="../index.html" class="hover:text-blue-650 transition-colors">Home</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <a href="../categories/text.html" class="hover:text-blue-650 transition-colors">Text Tools</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <span class="text-slate-800 dark:text-slate-300 font-medium">Text Compare</span>
    </nav>

    <div class="space-y-6">
      
      <!-- Page Title -->
      <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm">
        <h1 class="text-xl font-bold flex items-center gap-2">
          <i data-lucide="git-compare" class="text-blue-600 w-5 h-5"></i>
          <span>Text Compare Tool</span>
        </h1>
        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Paste your original and modified text below to run a line diff comparison.</p>
      </div>

      <!-- Input Columns -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Text A (Original) -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm flex flex-col">
          <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Original Text (A)</label>
          <textarea id="text-a" placeholder="Paste original text document here..." class="w-full h-64 p-3 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50 dark:bg-slate-950 dark:text-slate-100 transition-all font-mono text-sm resize-none"></textarea>
        </div>

        <!-- Text B (Modified) -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm flex flex-col">
          <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Modified Text (B)</label>
          <textarea id="text-b" placeholder="Paste modified text document here..." class="w-full h-64 p-3 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50 dark:bg-slate-950 dark:text-slate-100 transition-all font-mono text-sm resize-none"></textarea>
        </div>

      </div>

      <!-- Compare Button -->
      <div class="flex justify-center gap-3">
        <button onclick="clearCompare()" class="px-5 py-3 border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900 text-sm font-semibold rounded-xl transition-colors">Clear Fields</button>
        <button onclick="compareTexts()" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-xl transition-colors shadow-lg shadow-blue-500/10">Compare Documents</button>
      </div>

      <!-- Diff Output Display -->
      <div id="diff-output-container" class="hidden bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
        <h3 class="font-bold text-base mb-4 flex items-center gap-2">
          <i data-lucide="eye" class="text-blue-600 w-4 h-4"></i>
          <span>Comparison Results</span>
        </h3>
        
        <div class="grid grid-cols-2 bg-slate-100 dark:bg-slate-950 text-xs font-bold text-slate-500 uppercase p-2.5 rounded-t-xl border border-slate-200 dark:border-slate-800/80">
          <div class="pl-4">Original (A)</div>
          <div class="pl-4">Modified (B)</div>
        </div>
        
        <!-- Side by Side diff table -->
        <div id="diff-results" class="border-x border-b border-slate-200 dark:border-slate-800/80 rounded-b-xl overflow-hidden font-mono text-xs select-none"></div>
      </div>

    </div>
  </main>

  <footer class="mt-auto bg-slate-900 text-slate-550 border-t border-slate-800 py-6 text-center text-xs">
    <p>&copy; 2026 Narmada Tools. Secure Offline Utilities Hub.</p>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function clearCompare() {
      document.getElementById("text-a").value = "";
      document.getElementById("text-b").value = "";
      document.getElementById("diff-output-container").classList.add("hidden");
    }

    function compareTexts() {
      const a = document.getElementById("text-a").value;
      const b = document.getElementById("text-b").value;

      if (!a && !b) return;

      const linesA = a.split("\n");
      const linesB = b.split("\n");
      
      const maxLines = Math.max(linesA.length, linesB.length);
      let html = "";

      for (let i = 0; i < maxLines; i++) {
        const lineA = linesA[i] !== undefined ? linesA[i] : "";
        const lineB = linesB[i] !== undefined ? linesB[i] : "";

        let classA = "p-2 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors border-r border-slate-200 dark:border-slate-800 overflow-x-auto text-slate-700 dark:text-slate-350";
        let classB = "p-2 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors overflow-x-auto text-slate-700 dark:text-slate-350";

        if (lineA !== lineB) {
          if (linesA[i] !== undefined && linesB[i] === undefined) {
            // Line removed from A
            classA += " bg-red-100/70 dark:bg-red-950/35 text-red-800 dark:text-red-400";
            classB += " bg-slate-100/30 dark:bg-slate-900/30";
          } else if (linesA[i] === undefined && linesB[i] !== undefined) {
            // Line added to B
            classA += " bg-slate-100/30 dark:bg-slate-900/30";
            classB += " bg-emerald-100/70 dark:bg-emerald-950/35 text-emerald-800 dark:text-emerald-400";
          } else {
            // Line modified
            classA += " bg-red-50 dark:bg-red-950/20 text-red-750 dark:text-red-400/90";
            classB += " bg-emerald-50 dark:bg-emerald-950/20 text-emerald-750 dark:text-emerald-400/90";
          }
        }

        // HTML escape to display tags
        const escA = escapeHtml(lineA);
        const escB = escapeHtml(lineB);

        html += `
          <div class="grid grid-cols-2 border-b border-slate-100 dark:border-slate-900 last:border-b-0">
            <div class="${classA}">
              <span class="inline-block w-6 text-slate-400 select-none mr-2">${linesA[i] !== undefined ? (i + 1) : ""}</span>
              <span>${escA || "&nbsp;"}</span>
            </div>
            <div class="${classB}">
              <span class="inline-block w-6 text-slate-400 select-none mr-2">${linesB[i] !== undefined ? (i + 1) : ""}</span>
              <span>${escB || "&nbsp;"}</span>
            </div>
          </div>
        `;
      }

      document.getElementById("diff-results").innerHTML = html;
      document.getElementById("diff-output-container").classList.remove("hidden");
      
      // Trigger confetti to celebrate completion
      if (window.confetti) {
        window.confetti({ particleCount: 30, spread: 50, colors: ["#3b82f6", "#6366f1"] });
      }

      window.trackToolEvent("text-compare", "compare");
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
