<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free HTML/CSS/JS Minifier - Compress Scripts Online - Narmada Tools</title>
  <meta name="description" content="Minify and compress HTML documents, CSS stylesheets, and JavaScript scripts offline in your browser. Live size savings comparison metrics.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 font-sans transition-colors duration-200">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass-effect border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex items-center space-x-2">
        <img src="../logo.jpg" alt="Narmada Tools Logo" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-blue-500/10">
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">Narmada Tools</span>
      </a>

      <div class="flex items-center space-x-4">
        <button class="theme-toggle-btn p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors">
          <i data-lucide="sun" class="w-4 h-4 hidden dark:block text-amber-400"></i>
          <i data-lucide="moon" class="w-4 h-4 block dark:hidden text-slate-600"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <nav class="flex items-center space-x-2 text-xs text-slate-500 dark:text-slate-400 mb-6">
      <a href="../index.html" class="hover:text-blue-650 transition-colors">Home</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <a href="../categories/developer.html" class="hover:text-blue-650 transition-colors">Developer Tools</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <span class="text-slate-800 dark:text-slate-300 font-medium">Minifier</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Interactive Inputs -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <div class="flex items-center justify-between mb-4">
            <h1 class="text-xl font-bold flex items-center gap-2">
              <i data-lucide="file-minus" class="text-violet-600 w-5 h-5"></i>
              <span>HTML/CSS/JS Minifier</span>
            </h1>
            <div class="flex items-center gap-2">
              <!-- Type Selector -->
              <select id="min-type" class="px-2 py-1.5 text-xs border border-slate-250 dark:border-slate-800 rounded-lg bg-white dark:bg-slate-950 text-slate-700 dark:text-slate-300">
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="js">JavaScript</option>
              </select>
              <button onclick="clearField()" class="text-xs px-3 py-1.5 border border-red-200 dark:border-red-950 text-red-650 font-bold rounded-lg hover:bg-red-50 dark:hover:bg-red-950/20 transition-colors">Reset</button>
            </div>
          </div>

          <textarea id="min-input" placeholder="Paste your raw HTML, CSS, or JS code here..." class="w-full h-80 p-4 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50 dark:bg-slate-950 dark:text-slate-100 transition-all font-mono text-xs resize-none"></textarea>

          <div class="mt-4 flex justify-between items-center border-t border-slate-100 dark:border-slate-800 pt-4">
            <!-- Stats -->
            <div id="min-stats" class="hidden text-xs text-slate-500 dark:text-slate-400 font-medium">
              Original: <span id="stat-orig" class="font-bold text-slate-750 dark:text-slate-300">0 B</span> | 
              Minified: <span id="stat-min" class="font-bold text-slate-750 dark:text-slate-300">0 B</span> | 
              <span class="text-emerald-600 dark:text-emerald-400 font-bold" id="stat-saved">Saved 0%</span>
            </div>
            <div class="flex-grow"></div>
            <button onclick="executeMinify()" class="px-6 py-2.5 bg-violet-650 hover:bg-violet-700 text-white text-xs font-bold rounded-xl transition-colors shadow-md shadow-violet-500/10">Minify Code</button>
          </div>
        </div>

        <!-- Output Code -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Minified Code Result</label>
          <textarea id="min-output" readonly placeholder="Compressed code will appear here..." class="w-full h-80 p-4 border border-slate-250 dark:border-slate-800 rounded-xl bg-slate-50/50 dark:bg-slate-955 dark:text-slate-150 transition-all font-mono text-xs resize-none"></textarea>
          
          <div class="flex justify-end gap-2 mt-4">
            <button onclick="downloadMinified()" class="px-4 py-2 border border-slate-200 dark:border-slate-855 hover:bg-slate-50 dark:hover:bg-slate-900 text-xs font-semibold rounded-xl transition-colors flex items-center gap-1.5"><i data-lucide="download" class="w-4 h-4"></i>Download File</button>
            <button onclick="copyMinified()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-xl transition-colors flex items-center gap-1.5 shadow-md shadow-blue-500/10">
              <i data-lucide="copy" class="w-4 h-4"></i>
              <span>Copy Code</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="space-y-6">
        <div class="border border-dashed border-slate-350 dark:border-slate-800 p-6 rounded-2xl bg-white dark:bg-slate-900/50 flex flex-col justify-center items-center h-48">
          <i data-lucide="layout-grid" class="w-6 h-6 text-slate-400 mb-2"></i>
          <span class="text-xs text-slate-500 uppercase tracking-widest text-center">Sponsored Advertisement</span>
        </div>
      </div>

    </div>
  </main>

  <footer class="mt-auto bg-slate-900 text-slate-550 border-t border-slate-800 py-6 text-center text-xs">
    <p>&copy; 2026 Narmada Tools. Secure Offline Utilities Hub.</p>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function clearField() {
      document.getElementById("min-input").value = "";
      document.getElementById("min-output").value = "";
      document.getElementById("min-stats").classList.add("hidden");
    }

    function executeMinify() {
      const type = document.getElementById("min-type").value;
      const code = document.getElementById("min-input").value;
      if (!code.trim()) return;

      let minified = "";

      if (type === "html") {
        minified = minifyHTML(code);
      } else if (type === "css") {
        minified = minifyCSS(code);
      } else if (type === "js") {
        minified = minifyJS(code);
      }

      document.getElementById("min-output").value = minified;

      // Stats
      const origSize = code.length;
      const minSize = minified.length;
      const savings = origSize > 0 ? ((origSize - minSize) / origSize * 100).toFixed(0) : 0;

      document.getElementById("stat-orig").innerText = window.formatSize(origSize);
      document.getElementById("stat-min").innerText = window.formatSize(minSize);
      document.getElementById("stat-saved").innerText = `Saved ${savings}%`;
      document.getElementById("min-stats").classList.remove("hidden");

      if (window.confetti) {
        window.confetti({ particleCount: 35, spread: 60, colors: ["#8b5cf6", "#6366f1"] });
      }

      window.trackToolEvent("minifier", "minify");
    }

    function minifyHTML(html) {
      return html
        .replace(/<!--[\s\S]*?-->/g, '') // remove HTML comments
        .replace(/\s+/g, ' ')            // collapse whitespaces
        .replace(/>\s+</g, '><')         // remove whitespaces between tags
        .trim();
    }

    function minifyCSS(css) {
      return css
        .replace(/\/\*[\s\S]*?\*\//g, '') // remove comments
        .replace(/\s+/g, ' ')             // collapse spaces
        .replace(/\s*([\{\}:;,])\s*/g, '$1') // remove spaces around brackets and colons
        .replace(/;\}/g, '}')             // remove unnecessary semicolons
        .trim();
    }

    function minifyJS(js) {
      return js
        .replace(/\/\*[\s\S]*?\*\//g, '') // remove block comments
        .replace(/\/\/[^\n]*\n/g, '\n')    // remove line comments
        .replace(/\s+/g, ' ')             // collapse multiple whitespaces
        .replace(/\s*([\{\}\(\)=\+\-\*\/;:,])\s*/g, '$1') // remove spaces around operator characters
        .trim();
    }

    function copyMinified() {
      const output = document.getElementById("min-output").value;
      if (!output) return;
      window.copyToClipboard(output);
      window.trackToolEvent("minifier", "copy");
    }

    function downloadMinified() {
      const output = document.getElementById("min-output").value;
      if (!output) return;
      const type = document.getElementById("min-type").value;
      let filename = `minified-code.${type}`;
      let mime = "text/plain";
      
      if (type === "html") mime = "text/html";
      else if (type === "css") mime = "text/css";
      else if (type === "js") mime = "application/javascript";

      window.downloadFile(output, filename, mime);
      window.trackToolEvent("minifier", "download");
    }
  </script>
</body>
</html>
