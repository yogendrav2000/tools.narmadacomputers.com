<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free QR Code Generator - Customize Colors & Sizes - Narmada Tools</title>
  <meta name="description" content="Generate custom high-resolution QR codes offline. Customize foreground/background colors, size dimensions, and error correction. Free and private.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- QRCode CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 font-sans transition-colors duration-200">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass-effect border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex items-center space-x-2">
        <img src="../logo.jpg" alt="Narmada Tools Logo" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-blue-500/10">
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">Narmada Tools</span>
      </a>

      <div class="flex items-center space-x-4">
        <button class="theme-toggle-btn p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors">
          <i data-lucide="sun" class="w-4 h-4 hidden dark:block text-amber-400"></i>
          <i data-lucide="moon" class="w-4 h-4 block dark:hidden text-slate-600"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <nav class="flex items-center space-x-2 text-xs text-slate-500 dark:text-slate-400 mb-6">
      <a href="../index.html" class="hover:text-blue-650 transition-colors">Home</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <a href="../categories/image.html" class="hover:text-blue-650 transition-colors">Image Tools</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <span class="text-slate-800 dark:text-slate-300 font-medium">QR Code Generator</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Interactive Inputs -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <h1 class="text-xl font-bold flex items-center gap-2 mb-6">
            <i data-lucide="qr-code" class="text-emerald-600 w-5 h-5"></i>
            <span>QR Code Generator</span>
          </h1>

          <div class="space-y-4">
            <!-- Content Text -->
            <div>
              <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Text or Website URL</label>
              <input type="text" id="qr-data" value="https://narmadatools.com" class="w-full px-4 py-3 text-sm border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-950 dark:text-slate-100" placeholder="e.g. https://google.com or phone numbers" oninput="generateQR()">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <!-- Colors picker -->
              <div>
                <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Foreground Color</label>
                <div class="flex items-center space-x-2">
                  <input type="color" id="qr-color-dark" value="#000000" class="w-10 h-10 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer bg-white" onchange="generateQR()">
                  <input type="text" id="qr-color-dark-hex" value="#000000" class="px-3 py-2 text-xs border border-slate-250 dark:border-slate-800 rounded-xl w-28 uppercase text-slate-700 bg-white dark:bg-slate-950 dark:text-slate-300" oninput="updateHexColor('dark', this.value)">
                </div>
              </div>

              <div>
                <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Background Color</label>
                <div class="flex items-center space-x-2">
                  <input type="color" id="qr-color-light" value="#ffffff" class="w-10 h-10 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer bg-white" onchange="generateQR()">
                  <input type="text" id="qr-color-light-hex" value="#ffffff" class="px-3 py-2 text-xs border border-slate-250 dark:border-slate-800 rounded-xl w-28 uppercase text-slate-700 bg-white dark:bg-slate-950 dark:text-slate-300" oninput="updateHexColor('light', this.value)">
                </div>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <!-- Size dimensions selection -->
              <div>
                <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">QR Dimension (<span id="qr-size-val">300</span>px)</label>
                <input type="range" id="qr-size" min="150" max="800" value="300" step="10" class="w-full accent-emerald-600" oninput="updateQRSize(this.value)">
              </div>

              <!-- Error correction -->
              <div>
                <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Error Correction Level</label>
                <select id="qr-error-level" class="w-full px-3 py-2 text-sm border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-950 text-slate-700 dark:text-slate-300" onchange="generateQR()">
                  <option value="L">L (Low - 7% recovery)</option>
                  <option value="M" selected>M (Medium - 15% recovery)</option>
                  <option value="Q">Q (Quartile - 25% recovery)</option>
                  <option value="H">H (High - 30% recovery)</option>
                </select>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- Preview Sidebar -->
      <div class="space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm flex flex-col items-center">
          <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-4 self-start">Live QR Preview</label>
          
          <div class="border border-slate-200 dark:border-slate-800 p-4 rounded-2xl bg-white flex items-center justify-center min-h-64 min-w-64 max-w-full">
            <canvas id="qr-canvas"></canvas>
          </div>

          <button onclick="downloadQR()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold rounded-xl transition-colors mt-6 flex items-center justify-center gap-1.5 shadow-lg shadow-emerald-500/10">
            <i data-lucide="download" class="w-4 h-4"></i>
            <span>Download PNG</span>
          </button>
        </div>
      </div>

    </div>
  </main>

  <footer class="mt-auto bg-slate-900 text-slate-550 border-t border-slate-800 py-6 text-center text-xs">
    <p>&copy; 2026 Narmada Tools. Secure Offline Utilities Hub.</p>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function updateHexColor(type, val) {
      if (val.match(/^#[0-9A-F]{6}$/i)) {
        document.getElementById(`qr-color-${type}`).value = val;
        generateQR();
      }
    }

    function updateQRSize(val) {
      document.getElementById("qr-size-val").innerText = val;
      generateQR();
    }

    let qrInstance = null;

    function generateQR() {
      const canvas = document.getElementById("qr-canvas");
      const data = document.getElementById("qr-data").value;
      const size = parseInt(document.getElementById("qr-size").value);
      const darkColor = document.getElementById("qr-color-dark").value;
      const lightColor = document.getElementById("qr-color-light").value;
      const errorLevel = document.getElementById("qr-error-level").value;

      // Update hex inputs
      document.getElementById("qr-color-dark-hex").value = darkColor;
      document.getElementById("qr-color-light-hex").value = lightColor;

      if (!data) return;

      // QRious is defined globally by the CDN script
      if (window.QRious) {
        if (!qrInstance) {
          qrInstance = new QRious({
            element: canvas,
            value: data,
            size: size,
            foreground: darkColor,
            background: lightColor,
            level: errorLevel
          });
        } else {
          qrInstance.set({
            value: data,
            size: size,
            foreground: darkColor,
            background: lightColor,
            level: errorLevel
          });
        }
      }
    }

    function downloadQR() {
      const canvas = document.getElementById("qr-canvas");
      
      const url = canvas.toDataURL("image/png");
      const a = document.createElement("a");
      a.href = url;
      a.download = "qrcode-narmada_tools.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      
      if (window.confetti) {
        window.confetti({ particleCount: 50, spread: 60, colors: ["#10b981", "#059669"] });
      }

      window.trackToolEvent("qr-generator", "download");
    }

    // Trigger initial load
    window.addEventListener("DOMContentLoaded", () => {
      // Small timeout to guarantee CDN has loaded QRCode global object
      setTimeout(generateQR, 200);
    });
  </script>
</body>
</html>
