<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Robots.txt Generator - Search Crawler Directives Online - Narmada Tools</title>
  <meta name="description" content="Generate robots.txt crawl directives. Block specific search engines, allow page paths, set crawl delays, and append sitemaps. Safe and offline.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 font-sans transition-colors duration-200">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass-effect border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex items-center space-x-2">
        <img src="../logo.jpg" alt="Narmada Tools Logo" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-blue-500/10">
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">Narmada Tools</span>
      </a>

      <div class="flex items-center space-x-4">
        <button class="theme-toggle-btn p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors">
          <i data-lucide="sun" class="w-4 h-4 hidden dark:block text-amber-400"></i>
          <i data-lucide="moon" class="w-4 h-4 block dark:hidden text-slate-600"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <nav class="flex items-center space-x-2 text-xs text-slate-500 dark:text-slate-400 mb-6">
      <a href="../index.html" class="hover:text-blue-650 transition-colors">Home</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <a href="../categories/seo.html" class="hover:text-blue-650 transition-colors">SEO Tools</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <span class="text-slate-800 dark:text-slate-300 font-medium">Robots.txt Generator</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Interactive Inputs -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <h1 class="text-xl font-bold flex items-center gap-2 mb-6">
            <i data-lucide="file-warning" class="text-amber-600 w-5 h-5"></i>
            <span>Robots.txt Generator</span>
          </h1>

          <div class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <!-- Default Crawler Allowed -->
              <div>
                <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Default Crawler Allowed State</label>
                <select id="rb-default-state" class="w-full px-3 py-2 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-950 text-slate-700 dark:text-slate-300 text-sm" onchange="generateRobots()">
                  <option value="allow" selected>Allow (Indexed by default)</option>
                  <option value="disallow">Disallow (Block all by default)</option>
                </select>
              </div>

              <!-- Crawl Delay -->
              <div>
                <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Crawl Delay (seconds)</label>
                <select id="rb-delay" class="w-full px-3 py-2 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-950 text-slate-700 dark:text-slate-300 text-sm" onchange="generateRobots()">
                  <option value="none" selected>None</option>
                  <option value="5">5 seconds</option>
                  <option value="10">10 seconds</option>
                </select>
              </div>
            </div>

            <!-- Sitemap Link -->
            <div>
              <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">XML Sitemap URL</label>
              <input type="url" id="rb-sitemap" value="https://mywebsite.com/sitemap.xml" class="w-full px-4 py-2.5 text-sm border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-950 dark:text-slate-100" placeholder="e.g. https://mywebsite.com/sitemap.xml" oninput="generateRobots()">
            </div>

            <!-- Restricted Directories -->
            <div>
              <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Restricted Subdirectories (Disallowed - one per line)</label>
              <textarea id="rb-disallowed" class="w-full h-24 p-3 border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50/50 dark:bg-slate-955 dark:text-slate-100 transition-all font-mono text-sm resize-none" oninput="generateRobots()">/admin/
/temp/
/cgi-bin/</textarea>
            </div>
          </div>
        </div>

        <!-- Output Code -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Generated Robots.txt Output</label>
          <textarea id="robots-output" readonly placeholder="Output robots.txt directives will render here..." class="w-full h-60 p-4 border border-slate-250 dark:border-slate-800 rounded-xl bg-slate-50/50 dark:bg-slate-955 dark:text-slate-150 transition-all font-mono text-xs leading-relaxed resize-none"></textarea>
          
          <div class="flex justify-end gap-2 mt-4">
            <button onclick="downloadRobots()" class="px-4 py-2 border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900 text-xs font-semibold rounded-xl transition-colors flex items-center gap-1.5"><i data-lucide="download" class="w-4 h-4"></i>Download robots.txt</button>
            <button onclick="copyRobots()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-xl transition-colors flex items-center gap-1.5 shadow-md shadow-blue-500/10">
              <i data-lucide="copy" class="w-4 h-4"></i>
              <span>Copy Directives</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="space-y-6">
        <div class="border border-dashed border-slate-350 dark:border-slate-800 p-6 rounded-2xl bg-white dark:bg-slate-900/50 flex flex-col justify-center items-center h-48">
          <i data-lucide="layout-grid" class="w-6 h-6 text-slate-400 mb-2"></i>
          <span class="text-xs text-slate-500 uppercase tracking-widest text-center">Sponsored Advertisement</span>
        </div>
      </div>

    </div>
  </main>

  <footer class="mt-auto bg-slate-900 text-slate-550 border-t border-slate-800 py-6 text-center text-xs">
    <p>&copy; 2026 Narmada Tools. Secure Offline Utilities Hub.</p>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function generateRobots() {
      const state = document.getElementById("rb-default-state").value;
      const delay = document.getElementById("rb-delay").value;
      const sitemap = document.getElementById("rb-sitemap").value.trim();
      const disallowedText = document.getElementById("rb-disallowed").value;

      let txt = `# Robots.txt generated by Narmada Tools\n`;
      txt += `User-agent: *\n`;

      if (state === "disallow") {
        txt += `Disallow: /\n`;
      } else {
        // Allow all by default, write individual disallows
        const disallows = disallowedText.split("\n").map(d => d.trim()).filter(d => d.length > 0);
        
        disallows.forEach(d => {
          let path = d;
          if (!path.startsWith("/")) {
            path = "/" + path;
          }
          txt += `Disallow: ${path}\n`;
        });
      }

      if (delay !== "none") {
        txt += `Crawl-delay: ${delay}\n`;
      }

      if (sitemap) {
        txt += `\n# Sitemap URL\nSitemap: ${sitemap}\n`;
      }

      document.getElementById("robots-output").value = txt;
    }

    function copyRobots() {
      const text = document.getElementById("robots-output").value;
      if (!text) return;
      window.copyToClipboard(text);
      window.trackToolEvent("robots-generator", "copy");
    }

    function downloadRobots() {
      const text = document.getElementById("robots-output").value;
      if (!text) return;
      window.downloadFile(text, "robots.txt", "text/plain");
      window.trackToolEvent("robots-generator", "download");
    }

    window.addEventListener("DOMContentLoaded", () => {
      generateRobots();
    });
  </script>
</body>
</html>
