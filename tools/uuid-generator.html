<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free UUID Generator - Generate UUID v4 Online - Narmada Tools</title>
  <meta name="description" content="Generate random cryptographically secure UUID v4 strings instantly. Support bulk line generations, custom uppercase casing, and hyphen toggles.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</head>
<body class="flex flex-col min-h-screen text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 font-sans transition-colors duration-200">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass-effect border-b border-slate-200 dark:border-slate-800 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex items-center space-x-2">
        <img src="../logo.jpg" alt="Narmada Tools Logo" class="w-10 h-10 rounded-xl object-cover shadow-lg shadow-blue-500/10">
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">Narmada Tools</span>
      </a>

      <div class="flex items-center space-x-4">
        <button class="theme-toggle-btn p-2 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors">
          <i data-lucide="sun" class="w-4 h-4 hidden dark:block text-amber-400"></i>
          <i data-lucide="moon" class="w-4 h-4 block dark:hidden text-slate-600"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <nav class="flex items-center space-x-2 text-xs text-slate-500 dark:text-slate-400 mb-6">
      <a href="../index.html" class="hover:text-blue-650 transition-colors">Home</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <a href="../categories/developer.html" class="hover:text-blue-650 transition-colors">Developer Tools</a>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
      <span class="text-slate-800 dark:text-slate-300 font-medium">UUID Generator</span>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <!-- Interactive Inputs -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <h1 class="text-xl font-bold flex items-center gap-2 mb-6">
            <i data-lucide="fingerprint" class="text-violet-600 w-5 h-5"></i>
            <span>UUID Generator (v4)</span>
          </h1>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <!-- Quantity of UUIDs -->
            <div>
              <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Quantity to Generate</label>
              <input type="number" id="uuid-qty" min="1" max="1000" value="5" class="w-full px-3 py-2 text-sm border border-slate-250 dark:border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white dark:bg-slate-950 dark:text-slate-100" oninput="generateUUIDs()">
            </div>

            <!-- Toggles -->
            <div class="flex flex-col justify-end space-y-2 pb-2">
              <div class="flex items-center space-x-2">
                <input type="checkbox" id="uuid-hyphens" checked class="w-4 h-4 rounded accent-violet-600" onchange="generateUUIDs()">
                <label for="uuid-hyphens" class="text-xs font-semibold text-slate-650 dark:text-slate-400 cursor-pointer">Include hyphens</label>
              </div>
              <div class="flex items-center space-x-2">
                <input type="checkbox" id="uuid-uppercase" class="w-4 h-4 rounded accent-violet-600" onchange="generateUUIDs()">
                <label for="uuid-uppercase" class="text-xs font-semibold text-slate-650 dark:text-slate-400 cursor-pointer">Use uppercase letters</label>
              </div>
            </div>

          </div>

          <div class="mt-6 border-t border-slate-100 dark:border-slate-800 pt-4 flex justify-end">
            <button onclick="generateUUIDs()" class="px-6 py-2.5 bg-violet-650 hover:bg-violet-700 text-white text-xs font-bold rounded-xl transition-colors shadow-md shadow-violet-500/10">Generate UUIDs</button>
          </div>
        </div>

        <!-- Output Code -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
          <label class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-2">Generated UUID list</label>
          <textarea id="uuid-output" readonly placeholder="UUID outputs will appear here..." class="w-full h-80 p-4 border border-slate-250 dark:border-slate-800 rounded-xl bg-slate-50/50 dark:bg-slate-955 dark:text-slate-150 transition-all font-mono text-xs leading-relaxed resize-none"></textarea>
          
          <div class="flex justify-end gap-2 mt-4">
            <button onclick="downloadUUIDs()" class="px-4 py-2 border border-slate-200 dark:border-slate-850 hover:bg-slate-50 dark:hover:bg-slate-900 text-xs font-semibold rounded-xl transition-colors flex items-center gap-1.5"><i data-lucide="download" class="w-4 h-4"></i>Download (.txt)</button>
            <button onclick="copyUUIDs()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded-xl transition-colors flex items-center gap-1.5 shadow-md shadow-blue-500/10">
              <i data-lucide="copy" class="w-4 h-4"></i>
              <span>Copy List</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="space-y-6">
        <div class="border border-dashed border-slate-350 dark:border-slate-800 p-6 rounded-2xl bg-white dark:bg-slate-900/50 flex flex-col justify-center items-center h-48">
          <i data-lucide="layout-grid" class="w-6 h-6 text-slate-400 mb-2"></i>
          <span class="text-xs text-slate-500 uppercase tracking-widest text-center">Sponsored Advertisement</span>
        </div>
      </div>

    </div>
  </main>

  <footer class="mt-auto bg-slate-900 text-slate-550 border-t border-slate-800 py-6 text-center text-xs">
    <p>&copy; 2026 Narmada Tools. Secure Offline Utilities Hub.</p>
  </footer>

  <script src="../js/utils.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function generateUUIDv4() {
      // Use crypto randomUUID if supported, otherwise fallback
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      
      // Fallback RFC4122 compliance
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    function generateUUIDs() {
      let qty = parseInt(document.getElementById("uuid-qty").value) || 1;
      if (qty < 1) qty = 1;
      if (qty > 5000) qty = 5000; // Cap to prevent lag

      const hyphens = document.getElementById("uuid-hyphens").checked;
      const uppercase = document.getElementById("uuid-uppercase").checked;

      let list = [];
      for (let i = 0; i < qty; i++) {
        let uuid = generateUUIDv4();
        if (!hyphens) {
          uuid = uuid.replace(/-/g, "");
        }
        if (uppercase) {
          uuid = uuid.toUpperCase();
        }
        list.push(uuid);
      }

      document.getElementById("uuid-output").value = list.join("\n");
      
      if (window.confetti) {
        window.confetti({ particleCount: 30, spread: 50, colors: ["#8b5cf6", "#a78bfa"] });
      }

      window.trackToolEvent("uuid-generator", "generate");
    }

    function copyUUIDs() {
      const output = document.getElementById("uuid-output").value;
      if (!output) return;
      window.copyToClipboard(output);
      window.trackToolEvent("uuid-generator", "copy");
    }

    function downloadUUIDs() {
      const output = document.getElementById("uuid-output").value;
      if (!output) return;
      window.downloadFile(output, "uuids-list.txt", "text/plain");
      window.trackToolEvent("uuid-generator", "download");
    }

    // Trigger initial list
    window.addEventListener("DOMContentLoaded", () => {
      generateUUIDs();
    });
  </script>
</body>
</html>
